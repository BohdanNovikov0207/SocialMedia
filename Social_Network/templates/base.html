{% load static %}

<!DOCTYPE html><html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"><title>World IT</title>

<link rel="stylesheet" href="{% static 'css/base.css' %}">

</head><body><header>
    <div class="header-container">    <!-- LOGO -->
    <div class="header-container-logo">
        <img src="{% static 'images/logo.png' %}" alt="logo">
    </div>

    <!-- NAV -->
    <nav class="header-container-nav">

        <div class="inner-container-nav">
            <img src="{% static 'images/home.png' %}" alt="">
            <a href="{% url 'home' %}">Головна</a>
        </div>

        <div class="inner-container-nav">
            <img src="{% static 'images/post.png' %}" alt="">
            <a href="{% url 'posts' %}">Мої публікації</a>
        </div>

        <div class="inner-container-nav">
            <img src="{% static 'images/people.png' %}" alt="">
            <a href="{% url 'friends' %}">Друзі</a>
        </div>

        <div class="inner-container-nav">
            <img src="{% static 'images/settings.png' %}" alt="">
            <a href="{% url 'settings' %}">Налаштування</a>
        </div>

        <div class="inner-container-nav">
            <img src="{% static 'images/exit.png' %}" alt="">
            <a class="logout" href="#">Вихід</a>
        </div>

    </nav>

</div>

</header><main>
    <div class="main-container"><div class="content">
        {% block content %}
        {% endblock %}
    </div>

</div>

</main></body>
</html>
